name: qdexcode_desktop
description: qdexcode desktop app — native code intelligence platform.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # State management — Riverpod 3 with codegen
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # HTTP client
  dio: ^5.8.0+1

  # WebSocket
  web_socket_channel: ^3.0.2

  # Secure storage (token persistence)
  flutter_secure_storage: ^9.2.4

  # Local settings
  shared_preferences: ^2.5.3

  # Model annotations (freezed + JSON)
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # File/directory picker (desktop native dialogs)
  file_picker: ^8.3.7

  # Charts
  fl_chart: ^0.70.2

  # Icons
  cupertino_icons: ^1.0.8
  multi_split_view: ^3.6.1
  window_manager: ^0.5.1

  # Terminal emulator
  dart_pty:
    git:
      url: https://github.com/cdrury526/dart_pty.git
      ref: main
  dart_xterm:
    git:
      url: https://github.com/cdrury526/dart_xterm.git
      ref: master

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5
  freezed: ^3.0.6
  json_serializable: ^6.9.5
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5

flutter:
  uses-material-design: true
